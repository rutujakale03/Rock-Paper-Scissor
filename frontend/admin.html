<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ── Dark Indigo theme ── */
      :root {
        --bg:     #0f0e17; --card:   #1e1b4b; --card2:  #16133a;
        --accent: #a78bfa; --green:  #34d399; --red:    #f87171;
        --yellow: #fbbf24; --blue:   #60a5fa;
        --text:   #e2e8f0; --muted:  #94a3b8; --border: #2d2a5e;
      }
      *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
      body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; position:relative; overflow-x:hidden; }

      /* Blobs */
      .blob { position:fixed; border-radius:50%; filter:blur(100px); opacity:0.08; animation:floatBlob 14s ease-in-out infinite; pointer-events:none; z-index:0; }
      .blob-1 { width:600px; height:600px; background:var(--accent); top:-200px; left:-200px; }
      .blob-2 { width:500px; height:500px; background:var(--green);  bottom:-150px; right:-150px; animation-delay:-5s; }
      .blob-3 { width:350px; height:350px; background:var(--blue);   top:40%; left:50%; animation-delay:-10s; }
      @keyframes floatBlob {
        0%,100%{transform:translate(0,0) scale(1);}
        33%{transform:translate(40px,-50px) scale(1.06);}
        66%{transform:translate(-30px,25px) scale(0.94);}
      }

      .page-wrapper { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

      /* Navbar */
      .navbar {
        background:rgba(30,27,75,0.85); backdrop-filter:blur(12px);
        border-bottom:1px solid var(--border); padding:0 32px; height:64px;
        display:flex; align-items:center; justify-content:space-between;
        position:sticky; top:0; z-index:100;
      }
      .navbar-brand { font-size:1.2rem; font-weight:800; color:var(--accent); letter-spacing:0.5px; }
      .navbar-actions { display:flex; gap:12px; align-items:center; }
      .btn-nav { padding:8px 18px; border-radius:10px; font-family:'Poppins',sans-serif; font-size:0.85rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.2s, transform 0.15s; }
      .btn-nav:hover { opacity:0.85; transform:translateY(-1px); }
      .btn-nav.secondary { background:var(--border); color:var(--text); }
      .btn-nav.danger    { background:rgba(248,113,113,0.15); color:var(--red); border:1px solid rgba(248,113,113,0.3); }

      /* Main */
      .main { flex:1; padding:32px; max-width:1200px; margin:0 auto; width:100%; }
      .page-title    { font-size:1.5rem; font-weight:800; color:var(--text); margin-bottom:6px; }
      .page-subtitle { font-size:0.88rem; color:var(--muted); margin-bottom:32px; }

      /* Stats grid */
      .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:36px; }
      .stat-card {
        background:var(--card); border-radius:16px; padding:24px 20px;
        border-top:3px solid transparent; position:relative; overflow:hidden;
        transition:transform 0.2s;
      }
      .stat-card:hover { transform:translateY(-3px); }
      .stat-card.purple { border-top-color:var(--accent); }
      .stat-card.green  { border-top-color:var(--green); }
      .stat-card.red    { border-top-color:var(--red); }
      .stat-card.blue   { border-top-color:var(--blue); }
      .stat-label { font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }
      .stat-value { font-size:2.4rem; font-weight:800; line-height:1; margin-bottom:4px; }
      .stat-card.purple .stat-value { color:var(--accent); }
      .stat-card.green  .stat-value { color:var(--green); }
      .stat-card.red    .stat-value { color:var(--red); }
      .stat-card.blue   .stat-value { color:var(--blue); }
      .stat-icon { position:absolute; right:16px; top:16px; font-size:1.8rem; opacity:0.25; }

      /* Section header */
      .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
      .section-title  { font-size:1.1rem; font-weight:700; color:var(--text); }
      .btn-refresh {
        padding:8px 18px; background:rgba(167,139,250,0.12); color:var(--accent);
        border:1px solid rgba(167,139,250,0.3); border-radius:10px;
        font-family:'Poppins',sans-serif; font-size:0.85rem; font-weight:600; cursor:pointer;
        transition:background 0.2s, transform 0.15s;
      }
      .btn-refresh:hover { background:rgba(167,139,250,0.22); transform:translateY(-1px); }

      /* Table */
      .table-wrapper { background:var(--card); border-radius:16px; overflow:hidden; border:1px solid var(--border); }
      table { width:100%; border-collapse:collapse; font-size:0.88rem; }
      thead { background:var(--card2); }
      thead th { padding:14px 16px; text-align:left; font-size:0.75rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.7px; white-space:nowrap; }
      tbody tr { border-top:1px solid var(--border); transition:background 0.15s; }
      tbody tr:hover { background:rgba(255,255,255,0.03); }
      tbody tr:nth-child(even) { background:rgba(255,255,255,0.02); }
      tbody td { padding:14px 16px; color:var(--text); vertical-align:middle; }

      /* Badges */
      .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.3px; }
      .badge-admin { background:rgba(167,139,250,0.15); color:var(--accent); border:1px solid rgba(167,139,250,0.3); }
      .badge-user  { background:rgba(148,163,184,0.1);  color:var(--muted);  border:1px solid rgba(148,163,184,0.2); }
      .badge-win   { background:rgba(52,211,153,0.12);  color:var(--green);  border:1px solid rgba(52,211,153,0.25); }
      .badge-mid   { background:rgba(251,191,36,0.12);  color:var(--yellow); border:1px solid rgba(251,191,36,0.25); }
      .badge-low   { background:rgba(248,113,113,0.12); color:var(--red);    border:1px solid rgba(248,113,113,0.25); }

      .btn-delete {
        padding:6px 14px; background:rgba(248,113,113,0.1); color:var(--red);
        border:1px solid rgba(248,113,113,0.25); border-radius:8px;
        font-family:'Poppins',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer;
        transition:background 0.2s, transform 0.15s; white-space:nowrap;
      }
      .btn-delete:hover { background:rgba(248,113,113,0.22); transform:translateY(-1px); }

      .table-loading, .table-empty { text-align:center; padding:48px 20px; color:var(--muted); font-size:0.9rem; }
      .spinner { display:inline-block; width:28px; height:28px; border:3px solid rgba(167,139,250,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:12px; }
      @keyframes spin { to{transform:rotate(360deg);} }

      /* Toast */
      .toast {
        position:fixed; bottom:28px; left:50%;
        transform:translateX(-50%) translateY(80px);
        background:#1e1b4b; color:var(--text); padding:12px 24px;
        border-radius:12px; font-size:0.88rem; font-weight:600;
        border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,0,0,0.4);
        transition:transform 0.3s ease, opacity 0.3s ease;
        opacity:0; z-index:999; white-space:nowrap;
      }
      .toast.show  { transform:translateX(-50%) translateY(0); opacity:1; }
      .toast.error { border-color:rgba(248,113,113,0.4); color:var(--red); }

      @media (max-width:768px) {
        .main { padding:20px 16px; }
        .navbar { padding:0 16px; }
        .stat-value { font-size:1.8rem; }
        thead th:nth-child(9), tbody td:nth-child(9) { display:none; }
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="page-wrapper">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="navbar-brand">🎮 RPS Admin</div>
        <div class="navbar-actions">
          <a href="home.html"  class="btn-nav secondary" style="text-decoration:none;">🏠 Home</a>
          <button class="btn-nav secondary" id="btn-back-game">🎮 Back to Game</button>
          <button class="btn-nav danger"    id="btn-logout">↩ Logout</button>
        </div>
      </nav>

      <main class="main">
        <h1 class="page-title">Admin Dashboard</h1>
        <p class="page-subtitle">Overview of all players and game statistics</p>

        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card purple"><div class="stat-icon">👥</div><div class="stat-label">Total Players</div><div class="stat-value" id="stat-players">—</div></div>
          <div class="stat-card blue">  <div class="stat-icon">🎮</div><div class="stat-label">Total Games</div>  <div class="stat-value" id="stat-games">—</div></div>
          <div class="stat-card green"> <div class="stat-icon">🏆</div><div class="stat-label">Total Wins</div>   <div class="stat-value" id="stat-wins">—</div></div>
          <div class="stat-card red">   <div class="stat-icon">💀</div><div class="stat-label">Total Losses</div> <div class="stat-value" id="stat-losses">—</div></div>
        </div>

        <!-- Players Table -->
        <div class="section-header">
          <h2 class="section-title">All Players</h2>
          <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Username</th><th>Role</th><th>Games</th>
                <th>Wins</th><th>Losses</th><th>Draws</th><th>Win %</th>
                <th>Joined</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="players-tbody">
              <tr><td colspan="10"><div class="table-loading"><div class="spinner"></div><p>Loading players…</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API_BASE = 'http://localhost:5500/api';

      // ── Auth guard ──
      let currentSession = null;
      (function authGuard() {
        const raw = localStorage.getItem('rps_session');
        if (!raw) { window.location.href = 'login.html'; return; }
        try {
          const s = JSON.parse(raw);
          if (!s || !s.isAdmin) { window.location.href = 'login.html'; return; }
          currentSession = s;
        } catch { localStorage.removeItem('rps_session'); window.location.href = 'login.html'; }
      })();

      const statPlayers  = document.getElementById('stat-players');
      const statGames    = document.getElementById('stat-games');
      const statWins     = document.getElementById('stat-wins');
      const statLosses   = document.getElementById('stat-losses');
      const playersTbody = document.getElementById('players-tbody');
      const toast        = document.getElementById('toast');

      let toastTimer = null;
      function showToast(msg, isError = false) {
        toast.textContent = msg;
        toast.className   = 'toast show' + (isError ? ' error' : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3000);
      }

      function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      // Load overall stats
      async function loadStats() {
        try {
          const res  = await fetch(`${API_BASE}/admin/stats`);
          if (!res.ok) throw new Error();
          const data = await res.json();
          statPlayers.textContent = data.totalPlayers;
          statGames.textContent   = data.totalGames;
          statWins.textContent    = data.totalWins;
          statLosses.textContent  = data.totalLosses;
        } catch {
          statPlayers.textContent = statGames.textContent = statWins.textContent = statLosses.textContent = '?';
        }
      }

      // Load players table
      async function loadPlayers() {
        playersTbody.innerHTML = '<tr><td colspan="10"><div class="table-loading"><div class="spinner"></div><p>Loading players…</p></div></td></tr>';
        try {
          const res = await fetch(`${API_BASE}/admin/players`);
          if (!res.ok) throw new Error();
          const players = await res.json();

          if (players.length === 0) {
            playersTbody.innerHTML = '<tr><td colspan="10"><div class="table-empty">No players found.</div></td></tr>';
            return;
          }

          playersTbody.innerHTML = '';
          players.forEach((p, i) => {
            const winPct = p.total > 0 ? Math.round((p.wins / p.total) * 100) : 0;
            const winBadge = winPct >= 60 ? 'badge-win' : winPct >= 40 ? 'badge-mid' : 'badge-low';
            const joined   = new Date(p.createdAt).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
            const isSelf   = currentSession && p.username === currentSession.username;
            const deleteBtn = isSelf
              ? `<span style="color:var(--muted);font-size:0.78rem;">You</span>`
              : `<button class="btn-delete" data-username="${escapeHtml(p.username)}">🗑 Delete</button>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td style="color:var(--muted);font-weight:600;">${i+1}</td>
              <td style="font-weight:600;">${escapeHtml(p.username)}</td>
              <td><span class="badge ${p.isAdmin ? 'badge-admin' : 'badge-user'}">${p.isAdmin ? '⭐ Admin' : 'User'}</span></td>
              <td style="font-weight:600;">${p.total}</td>
              <td style="color:var(--green);font-weight:600;">${p.wins}</td>
              <td style="color:var(--red);font-weight:600;">${p.losses}</td>
              <td style="color:var(--muted);">${p.draws}</td>
              <td><span class="badge ${winBadge}">${winPct}%</span></td>
              <td style="color:var(--muted);font-size:0.82rem;">${joined}</td>
              <td>${deleteBtn}</td>`;
            playersTbody.appendChild(tr);
          });
        } catch {
          playersTbody.innerHTML = '<tr><td colspan="10"><div class="table-empty">❌ Could not load players. Is the server running?</div></td></tr>';
        }
      }

      // Delete player (event delegation)
      playersTbody.addEventListener('click', async (e) => {
        const btn = e.target.closest('.btn-delete');
        if (!btn) return;
        const username = btn.dataset.username;
        if (!confirm(`Delete "${username}"?\n\nThis removes the player and ALL their game history.`)) return;

        btn.disabled = true; btn.textContent = 'Deleting…';
        try {
          const res = await fetch(`${API_BASE}/admin/player/${encodeURIComponent(username)}`, { method:'DELETE' });
          if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Delete failed'); }
          showToast(`✅ Player "${username}" deleted.`);
          loadStats(); loadPlayers();
        } catch (err) {
          showToast(`❌ ${err.message}`, true);
          btn.disabled = false; btn.textContent = '🗑 Delete';
        }
      });

      document.getElementById('btn-refresh').addEventListener('click', () => { loadStats(); loadPlayers(); showToast('Data refreshed ↻'); });
      document.getElementById('btn-back-game').addEventListener('click', () => { window.location.href = 'index.html'; });
      document.getElementById('btn-logout').addEventListener('click', () => { localStorage.removeItem('rps_session'); window.location.href = 'login.html'; });

      // Initial load
      loadStats();
      loadPlayers();
    </script>
  </body>
</html>
